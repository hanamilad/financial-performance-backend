; OPcache — local development profile.
;
; validate_timestamps stays enabled so edits on the bind-mounted source tree
; take effect without restarting the container. The production profile
; (validate_timestamps=0 + opcache.preload) is deferred to Phase 16.
;
; revalidate_freq was 0, which re-stat()s every included file on every request.
; Over the Windows/Docker bind mount that stat-storm cost ~2s per request for
; the whole framework, so even a trivial endpoint took ~2.4s (IMPORT-002 perf
; investigation). A 60s window keeps the compiled cache warm between requests
; — warm requests drop to ~0.1s — while edits still auto-reflect within a minute.

opcache.enable = 1
opcache.enable_cli = 0

opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000

opcache.validate_timestamps = 1
opcache.revalidate_freq = 60

opcache.save_comments = 1
opcache.jit = disable
