; PHP-FPM pool overrides — sized for a small VPS and for local development.
; Loaded as php-fpm.d/zzz-app.conf, after the image's own www.conf.

[global]
error_log = /proc/self/fd/2
log_limit = 8192

[www]
user = www-data
group = www-data

listen = 9000
listen.backlog = 511

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Compose passes configuration through the environment; keep it visible to PHP.
clear_env = no

; Send worker output to the container stream instead of a file inside the
; bind mount.
catch_workers_output = yes
decorate_workers_output = no

; Must stay above php.ini's max_execution_time so PHP reports the timeout.
request_terminate_timeout = 180

; Enables the php-fpm status/ping endpoints for the container healthcheck.
ping.path = /fpm-ping
ping.response = pong
pm.status_path = /fpm-status
