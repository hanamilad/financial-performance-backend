; Application PHP settings — local development.
; Loaded as conf.d/zzz-app.ini so it overrides the image defaults.

memory_limit = 512M
max_execution_time = 120
max_input_time = 120

; Excel imports are the largest uploads the platform accepts.
upload_max_filesize = 64M
post_max_size = 64M
max_file_uploads = 20

; Arabic content handling.
default_charset = "UTF-8"
mbstring.language = Neutral

; Laravel manages the application timezone via APP_TIMEZONE; PHP itself stays
; on UTC so stored timestamps are unambiguous.
date.timezone = UTC

expose_php = Off

; Local development: surface everything, log to the container stream so the
; output is visible through `docker compose logs`.
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /proc/self/fd/2

realpath_cache_size = 4096k
realpath_cache_ttl = 600
