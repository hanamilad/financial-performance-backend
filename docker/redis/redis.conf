# Redis — local development profile.
#
# This instance backs the queue, cache, sessions, locks, rate limiting and
# idempotency keys (SOLUTION_ARCHITECTURE §9.1).

bind 0.0.0.0
protected-mode no
port 6379

# Queued jobs are not regenerable, so eviction is never acceptable here even
# though the same instance also serves the cache. An out-of-memory error is
# strictly better than silently dropping a job.
maxmemory 256mb
maxmemory-policy noeviction

appendonly yes
appendfsync everysec
dir /data

save 900 1
save 300 10
save 60 10000

timeout 0
tcp-keepalive 300

loglevel notice
logfile ""

# No `requirepass` locally. Production sets one and publishes no port
# (deferred to Phase 16).
