server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    charset_types text/plain text/css application/json application/javascript text/xml;

    # Excel imports are the largest request bodies the platform accepts.
    # Keep aligned with upload_max_filesize / post_max_size in docker/php/php.ini.
    client_max_body_size 64M;
    client_body_timeout 120s;

    access_log /dev/stdout;
    error_log /dev/stderr;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param HTTP_PROXY "";

        fastcgi_read_timeout 180s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        internal;
    }

    # Only the front controller may execute PHP. Any other .php path is a
    # request for a file that should not be reachable.
    location ~ \.php$ {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
